name: Deploy to VPS

on:
  workflow_dispatch: # pm2-деплой вручную; основной — deploy-docker.yml

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Pack release
        run: |
          mkdir -p release
          cp -r .next public package.json package-lock.json prisma next.config.ts deploy release/
          cd release && npm ci --omit=dev && npx prisma generate
          cd .. && tar -czf termiz-release.tar.gz -C release .

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: termiz-release.tar.gz
          target: /var/www/termiz

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/termiz
            tar -xzf termiz-release.tar.gz
            rm -f termiz-release.tar.gz
            bash deploy/post-deploy.sh
