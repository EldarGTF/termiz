name: Deploy Docker to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build Next.js
        env:
          DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build
          AUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3000
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Build Docker image
        run: docker build -t termiz:latest .

      - name: Save image
        run: docker save termiz:latest -o termiz-image.tar

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: termiz-image.tar,docker-compose.prod.yml,deploy/post-deploy-docker.sh,deploy/nginx-termiz.conf
          target: /var/www/termiz

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /var/www/termiz/deploy
            cd /var/www/termiz
            mv -f post-deploy-docker.sh deploy/ 2>/dev/null || true
            mv -f nginx-termiz.conf deploy/ 2>/dev/null || true
            bash deploy/post-deploy-docker.sh
