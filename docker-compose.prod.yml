services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=30"]
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-termiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-termiz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-termiz} -d ${POSTGRES_DB:-termiz}"]
      interval: 5s
      timeout: 5s
      retries: 10
    shm_size: 128mb

  app:
    image: termiz:latest
    restart: unless-stopped
    entrypoint: ["sh", "docker-entrypoint.sh"]
    command: ["node", "server.js"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-termiz}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-termiz}?connection_limit=5
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=384
      HOSTNAME: 0.0.0.0
      PORT: 3000
    mem_limit: 512m
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
